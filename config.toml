cli-source = "revanced/revanced-cli"
patches-source = "revanced/revanced-patches"
integrations-source = "revanced/revanced-integrations"

[YouTube]
enabled = true
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
version = "auto"
arch = "all"
included-patches = "'Announcements' 'Bypass URL redirects' 'Change start page' 'Enable slide to seek' 'GmsCore support' 'Hide ads' 'Navigation buttons' 'Open links externally' 'Remember video quality' 'Remove background playback restrictions' 'Remove tracking query parameter' 'Remove viewer discretion dialog' 'Restore old seekbar thumbnails' 'Restore old video quality menu' 'Return YouTube Dislike' 'Seekbar tapping' 'SponsorBlock' 'Spoof app version' 'Spoof client' 'Spoof device dimensions' 'Video ads'"
exclusive-patches = true

[YouTube-Music]
enabled = true
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music/"
version = "auto"
arch = "both"

[Twitch]
enabled = true
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/twitch-interactive-inc/twitch/"
version = "auto"
arch = "all"

[TikTok]
enabled = true
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/tiktok-pte-ltd/tik-tok/"
version = "auto"
arch = "all"
included-patches = "'SIM spoof'"

[TikTok-Musically]
enabled = false
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/tiktok-pte-ltd/tik-tok-including-musical-ly/"
version = "auto"
arch = "all"
included-patches = "'SIM spoof'"

[Lightroom]
enabled = false
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/adobe/lightroom/"
version = "auto"
arch = "arm64-v8a"

[VSCO]
enabled = false
build-mode = "apk"
uptodown-dlurl = "https://vsco-cam.en.uptodown.com/android"
version = "auto"
arch = "all"
