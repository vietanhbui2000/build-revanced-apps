[YouTube]
enabled = true
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
version = "auto"
arch = "all"
included-patches = "'Bypass image region restrictions' 'Bypass URL redirects' 'Check watch history domain name resolution' 'Disable player popup panels' 'Disable precise seeking gesture' 'Disable resuming Shorts on startup' 'Disable suggested video end screen' 'Disable zoom haptics' 'Enable slide to seek' 'GmsCore support' 'Hide ads' 'Hide endscreen cards' 'Hide floating microphone button' 'Hide info cards' 'Hide layout components' 'Hide Shorts components' 'Open links externally' 'Remember video quality' 'Remove background playback restrictions' 'Remove tracking query parameter' Remove viewer discretion dialog' 'Restore old seekbar thumbnails' 'Restore old video quality menu' 'Return YouTube Dislike' 'Seekbar tapping' 'SponsorBlock' 'Spoof app version' 'Spoof device dimensions' 'Spoof video streams' 'Video ads'"
exclusive-patches = true

[YouTube-Music]
